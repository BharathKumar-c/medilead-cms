#### render.yaml
# Render Blueprint for MediLead CMS
# See https://render.com/docs/blueprint-spec for details
####

services:
  # Backend API Web Service
  - type: web
    name: medilead-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_CA_CERT
        value: ./certs/ca.pem
      - key: DB_POOL_MAX
        value: "20"
      - key: DB_POOL_MIN
        value: "2"
      - key: DB_IDLE_TIMEOUT
        value: "30000"
      - key: DB_CONNECT_TIMEOUT
        value: "10000"
      - key: DB_STATEMENT_TIMEOUT
        value: "30000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        value: https://medilead-cms.onrender.com
      - key: LOG_LEVEL
        value: info

  # Frontend Static Site
  - type: static_site
    name: medilead-cms
    runtime: static
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://medilead-api.onrender.com/api
      - key: VITE_APP_NAME
        value: MediLead CMS
      - key: VITE_APP_ENV
        value: production
