#### render.yaml
# Render Blueprint for MediLead CMS
# See https://render.com/docs/blueprint-spec for details
####

services:
  # Backend API + Frontend (combined service)
  - type: web
    name: medilead-api
    runtime: node
    region: oregon  # Change to closest region
    plan: free  # Change to 'starter' for production
    buildCommand: npm install && npm run build && cd server && npm install
    startCommand: cd server && node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: VITE_API_URL
        value: /api
      - key: VITE_APP_NAME
        value: MediLead CMS
      - key: VITE_APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false  # Set in dashboard: postgres://avnadmin:PASSWORD@pg-2177bf51-pediacaredemo.e.aivencloud.com:21863/defaultdb?sslmode=require&uselibpqcompat=true
      - key: DB_SSL
        value: "true"
      - key: DB_SSL_CA_CERT
        value: ./certs/ca.pem
      - key: DB_POOL_MAX
        value: "20"
      - key: DB_POOL_MIN
        value: "2"
      - key: DB_IDLE_TIMEOUT
        value: "30000"
      - key: DB_CONNECT_TIMEOUT
        value: "10000"
      - key: DB_STATEMENT_TIMEOUT
        value: "30000"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: LOG_LEVEL
        value: info
      - key: CORS_ORIGIN
        value: https://medilead-cms.onrender.com
